# VaniAI — full stack: PostgreSQL, FastAPI backend, React frontend (nginx),
# MLflow tracking server, Prometheus and Grafana.
#
# Usage:
#   docker compose up -d --build
#   docker compose logs -f backend
#
# Host ports (docs/CONTRACTS.md section 3):
#   backend 8000 | frontend 3000 | mlflow 5000 | prometheus 9090
#   grafana 3001 | postgres 5432

name: vaniai

services:
  postgres:
    image: postgres:16
    container_name: vaniai-postgres
    environment:
      POSTGRES_USER: vaniai
      POSTGRES_PASSWORD: vaniai
      POSTGRES_DB: vaniai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Runs once on the first init of an empty data directory and creates the
      # second database (`mlflow`) used as the MLflow backend store.
      - ./mlops/postgres/init-mlflow-db.sql:/docker-entrypoint-initdb.d/10-init-mlflow-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaniai -d vaniai"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: vaniai-backend
    # Apply migrations first (production path), then start the API server.
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://vaniai:vaniai@postgres:5432/vaniai
      SECRET_KEY: change-me-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
      MODEL_DIR: /app/ml_artifacts
      UPLOAD_DIR: /app/uploads
      MLFLOW_TRACKING_URI: http://mlflow:5000
      ENVIRONMENT: production
      # Alembic (above) owns the schema in containers; create_all stays off.
      AUTO_CREATE_TABLES: "false"
    ports:
      - "8000:8000"
    volumes:
      - ml_artifacts:/app/ml_artifacts
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: vaniai-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.19.0
    container_name: vaniai-mlflow
    # The upstream MLflow image ships without a PostgreSQL driver, so install a
    # pinned psycopg2-binary before starting the tracking server (the documented
    # reliable option — no custom image required). --serve-artifacts with
    # --artifacts-destination proxies artifact up/downloads through the server,
    # so client containers never need access to this filesystem path.
    command: >
      bash -c "pip install --no-cache-dir psycopg2-binary==2.9.10 &&
               mlflow server
               --backend-store-uri postgresql://vaniai:vaniai@postgres:5432/mlflow
               --serve-artifacts
               --artifacts-destination /mlflow/artifacts
               --host 0.0.0.0
               --port 5000"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: vaniai-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    ports:
      - "9090:9090"
    volumes:
      - ./mlops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - backend
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    container_name: vaniai-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - ./mlops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./mlops/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pgdata:
  ml_artifacts:
  uploads:
  mlflow_artifacts:
  prometheus_data:
  grafana_data:
