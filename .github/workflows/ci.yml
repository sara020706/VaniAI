# VaniAI CI — backend lint + tests, frontend typecheck + build, docker builds.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # SQLite-friendly test environment — no PostgreSQL service needed in CI.
      DATABASE_URL: sqlite:///./test.db
      SECRET_KEY: ci-only-secret-key-not-for-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      MODEL_DIR: ./ml_artifacts
      UPLOAD_DIR: ./uploads
      # Empty tracking URI => ML code logs locally and never requires a server.
      MLFLOW_TRACKING_URI: ""
      ENVIRONMENT: test
      AUTO_CREATE_TABLES: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests (pytest)
        run: pytest -q

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          # npm caching requires a committed lockfile; it switches on
          # automatically once frontend/package-lock.json exists.
          cache: ${{ hashFiles('frontend/package-lock.json') != '' && 'npm' || '' }}
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        # npm ci is the reproducible path once package-lock.json is committed
        # (it is generated by the first local `npm install`).
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: false
          tags: vaniai-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: false
          tags: vaniai-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
