# Alembic configuration for the VaniAI backend.
# Run from the backend/ directory: `alembic upgrade head`

[alembic]
script_location = alembic

# Add the backend/ directory to sys.path so `app.*` imports resolve in env.py.
prepend_sys_path = .

# Template for new migration filenames.
file_template = %%(rev)s_%%(slug)s

# Fallback database URL — overridden at runtime by DATABASE_URL via app settings
# (see alembic/env.py).
sqlalchemy.url = postgresql+psycopg2://vaniai:vaniai@localhost:5432/vaniai

# Max length of the slug portion of migration filenames.
truncate_slug_length = 40

# Path separator for version_locations (os = os.pathsep).
version_path_separator = os

[post_write_hooks]
# No post-write hooks configured.

# --- Logging -------------------------------------------------------------------------

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
