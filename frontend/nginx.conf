# VaniAI frontend — serves the built SPA and proxies API traffic to the
# FastAPI backend container (compose service name: backend).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Resume PDFs (<= 5 MB) and dataset CSVs are uploaded through this proxy.
    client_max_body_size 10m;

    # API proxy — proxy_pass without a URI part preserves the original path,
    # so /api/v1/... reaches the backend unchanged as /api/v1/...
    location /api {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Hashed Vite build output is immutable — cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache the entry point so new deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback for client-side (React Router) routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
